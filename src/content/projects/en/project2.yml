pageContent:
  intro:
    mockupImage: "../../../assets/images/split-app-dashboard.png"
    mockupAlt: "Mockup of the Split4Me App main screen"
    problemHeading: "Problem"
    problemDescription: "Many shared expense apps have evolved toward high-cost subscription models, locking basic features behind paywalls."
    solutionHeading: "Solution"
    solutionDescription: "Propose a privacy-centered alternative, avoiding artificial paywalls to gain competitive advantage and reduce friction from legacy apps."
  process:
    heading: "Process"
    description: "The process starts with a Deep Research on the evolution and disruption of shared expense apps. After exploring solutions and their economic viability, the user flow and wireframes are defined. In parallel with UI design, development requirements are defined following the Spec-driven development methodology."
    steps:
      - label: "Research"
        description: "Legacy app analysis and solution ideation"
      - label: "Prototyping"
        description: "User flow · Wireframes"
      - label: "Design"
        description: "Design · UI Kit"
      - label: "Development"
        description: "Spec-driven development"
  features:
    heading: "Project"
    description: "Split4Me follows a zero-friction approach based on two pillars: deferred authentication, allowing the app to be fully functional immediately without previous registration, and a local-first architecture that decentralizes data storage on the client device."
    items:
      - title: "Personal cloud synchronization"
        description: "Instead of corporate servers, synchronization between devices and backups are performed through the user's own personal and encrypted accounts, such as iCloud Drive (Apple) and Google Drive (Android/Web)."
        image: "../../../assets/images/connect-storage.png"
        imageAlt: "Connect with personal cloud storage"
      - title: "On-device processing"
        description: "Complex tasks such as AI-powered OCR for receipt scanning run locally using the device's hardware, ensuring privacy and reducing network costs."
        image: "../../../assets/images/add-expense.png"
        imageAlt: "New expense via OCR or manual inputs"
      - title: "Fintech affiliation"
        description: "Integrates deep links to settle debts through neobanks. High-frequency users (business travelers or freelancers) can pay for advanced features like bulk export to Excel/CSV or unlimited receipt photo storage."
        image: "../../../assets/images/settle.png"
        imageAlt: "Interface components for settling debt"
