title: "Split4Me App"
description: "Legacy expense-splitting apps have systematically enclosed their core value propositions within high-cost, recurring subscription paywalls. Split4Me app remain fully functional without requiring an upfront registration wall."
technologies:
  - App Design
  - Product Design
  - UX/UI
  - Figma
