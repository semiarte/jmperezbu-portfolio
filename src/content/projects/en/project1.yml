  additionalSection:
    heading: "Budget manager"
    description: "A budget management application that allows managers to manage and distribute the annual budget among their employees on a monthly basis. The manager sets up their annual budget and the system ensures that allocations do not exceed the total available."
    image: "/budget-manager.png"
    imageAlt: "Web application for budget management"
